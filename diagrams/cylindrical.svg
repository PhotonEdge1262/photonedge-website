<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Cylindrical lens (shown as rectangle with curved top) -->
  <rect x="192" y="45" width="16" height="110" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="1.5" rx="1"/>
  <path d="M192,45 Q200,35 208,45" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Rays -->
  <line x1="40" y1="70" x2="190" y2="88" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="40" y1="100" x2="190" y2="100" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="40" y1="130" x2="190" y2="112" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="210" y1="90" x2="360" y2="100" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="210" y1="100" x2="360" y2="100" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="210" y1="110" x2="360" y2="100" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <circle cx="360" cy="100" r="3" fill="#ef4444"/>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Line focus in one axis</text>
  <text x="100" y="30" text-anchor="middle" font-size="11" fill="#64748b">Parallel Light</text>
  <text x="280" y="30" text-anchor="middle" font-size="11" fill="#64748b">Line Focus</text>
</svg>