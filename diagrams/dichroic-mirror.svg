<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Dichroic mirror at 45 degrees -->
  <line x1="140" y1="40" x2="260" y2="160" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- Incoming white light -->
  <line x1="40" y1="100" x2="180" y2="100" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="80" y="90" font-size="10" fill="#64748b">White Light</text>
  <!-- Transmitted wavelength (e.g., red) -->
  <line x1="220" y1="100" x2="370" y2="100" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="300" y="90" font-size="10" fill="#ef4444">Transmitted λ₁</text>
  <!-- Reflected wavelength (e.g., blue) at 90 degrees -->
  <line x1="200" y1="80" x2="200" y2="20" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="215" y="25" font-size="10" fill="#3b82f6">Reflected λ₂</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Wavelength-selective beam splitting at 45°</text>
</svg>