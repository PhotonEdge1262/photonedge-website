<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Waveplate -->
  <rect x="185" y="45" width="30" height="110" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="1.5" rx="1"/>
  <!-- Fast/Slow axis labels -->
  <line x1="188" y1="50" x2="188" y2="150" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="212" y1="50" x2="212" y2="150" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="180" y="165" font-size="8" fill="#ef4444" text-anchor="end">Fast</text>
  <text x="220" y="165" font-size="8" fill="#22c55e">Slow</text>
  <!-- Input polarization (vertical) -->
  <line x1="80" y1="60" x2="80" y2="140" stroke="#3b82f6" stroke-width="2"/>
  <line x1="60" y1="100" x2="100" y2="100" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="45" text-anchor="middle" font-size="9" fill="#64748b">Linear in</text>
  <!-- Output polarization (rotated) -->
  <g transform="translate(320,100) rotate(45)">
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#ef4444" stroke-width="2"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#ef4444" stroke-width="1"/>
  </g>
  <text x="320" y="45" text-anchor="middle" font-size="9" fill="#64748b">Rotated out</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Waveplate: introduces phase retardation between axes</text>
</svg>