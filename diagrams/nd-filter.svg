<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <rect x="185" y="40" width="30" height="120" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1.5" rx="1"/>
  <!-- Input (bright) -->
  <line x1="30" y1="85" x2="183" y2="95" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <line x1="30" y1="100" x2="183" y2="100" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <line x1="30" y1="115" x2="183" y2="105" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <!-- Output (dimmer) -->
  <line x1="217" y1="95" x2="370" y2="97" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="217" y1="100" x2="370" y2="100" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="217" y1="105" x2="370" y2="103" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <text x="80" y="75" font-size="10" fill="#64748b">High intensity</text>
  <text x="300" y="90" font-size="10" fill="#64748b">Reduced intensity</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">ND filter: uniform attenuation across wavelengths</text>
</svg>