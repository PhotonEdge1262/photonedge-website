<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Mirror surface -->
  <line x1="200" y1="40" x2="200" y2="160" stroke="#3b82f6" stroke-width="3"/>
  <!-- Hatching on back -->
  <line x1="200" y1="40" x2="210" y2="50" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="55" x2="210" y2="65" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="70" x2="210" y2="80" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="85" x2="210" y2="95" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="100" x2="210" y2="110" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="115" x2="210" y2="125" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="130" x2="210" y2="140" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="145" x2="210" y2="155" stroke="#94a3b8" stroke-width="1"/>
  <!-- Normal line -->
  <line x1="140" y1="100" x2="260" y2="100" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="265" y="104" font-size="10" fill="#94a3b8">Normal</text>
  <!-- Incoming ray -->
  <line x1="80" y1="30" x2="197" y2="97" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <!-- Reflected ray -->
  <line x1="203" y1="97" x2="320" y2="30" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <!-- Angle labels -->
  <path d="M160,100 A40,40 0 0,1 140,68" fill="none" stroke="#64748b" stroke-width="0.8"/>
  <text x="140" y="78" font-size="10" fill="#64748b">θi</text>
  <path d="M240,100 A40,40 0 0,0 260,68" fill="none" stroke="#64748b" stroke-width="0.8"/>
  <text x="255" y="78" font-size="10" fill="#64748b">θr</text>
  <text x="80" y="25" font-size="11" fill="#64748b">Incident</text>
  <text x="290" y="25" font-size="11" fill="#64748b">Reflected</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">θi = θr (Law of Reflection)</text>
</svg>