<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Right angle prism -->
  <polygon points="140,160 260,160 260,50" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Incoming ray -->
  <line x1="40" y1="105" x2="175" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <!-- Internal reflection off hypotenuse -->
  <line x1="175" y1="105" x2="220" y2="105" stroke="#3b82f6" stroke-width="1"/>
  <!-- Reflected ray going up -->
  <line x1="220" y1="105" x2="220" y2="30" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="80" y="98" font-size="10" fill="#64748b">Input</text>
  <text x="230" y="30" font-size="10" fill="#64748b">90° reflected</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Total Internal Reflection - 90° deviation</text>
</svg>