<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Corner cube (retroreflector) simplified -->
  <polygon points="200,40 140,160 260,160" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Incoming ray -->
  <line x1="60" y1="80" x2="175" y2="108" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <!-- Retroreflected ray (parallel to input) -->
  <line x1="175" y1="115" x2="60" y2="140" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="40" y="75" font-size="10" fill="#64748b">Input</text>
  <text x="40" y="150" font-size="10" fill="#64748b">Retroreflected</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Retroreflector: output parallel to input</text>
</svg>