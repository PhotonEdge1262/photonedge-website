<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Safety goggle lens -->
  <path d="M140,70 Q200,55 260,70 Q265,100 260,130 Q200,145 140,130 Q135,100 140,70" fill="rgba(59,130,246,0.12)" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Laser beam coming in -->
  <line x1="40" y1="100" x2="140" y2="100" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <!-- Attenuated beam coming out -->
  <line x1="260" y1="100" x2="360" y2="100" stroke="#ef4444" stroke-width="0.8" marker-end="url(#arrowR)"/>
  <!-- Blocked wavelengths -->
  <line x1="40" y1="80" x2="140" y2="80" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="80" y="70" font-size="9" fill="#8b5cf6">Laser λ</text>
  <text x="300" y="95" font-size="9" fill="#64748b">Safe level</text>
  <text x="80" y="120" font-size="10" fill="#64748b">Hazardous</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Laser safety goggle: OD-rated wavelength protection</text>
</svg>