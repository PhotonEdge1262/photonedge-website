<script>
var currentProduct = null;
document.addEventListener('DOMContentLoaded', function() {
    var slug = 'protected-aluminum-mirrors';
    if (typeof PRODUCTS !== 'undefined') {
        for (var i = 0; i < PRODUCTS.length; i++) {
            if (PRODUCTS[i].slug === slug) { currentProduct = PRODUCTS[i]; break; }
        }
    }
    if (currentProduct) { renderProductDetail(); }
});

function renderProductDetail() {
    var lang = (typeof getCurrentLang === 'function') ? getCurrentLang() : 'en';
    var p = currentProduct;
    var name = lang === 'zh' && p.nameZh ? p.nameZh : p.name;
    var desc = lang === 'zh' && p.descriptionZh ? p.descriptionZh : p.description;
    var grid = document.getElementById('productDetailGrid');
    var html = '<div class="product-detail-content">';
    html += '<h1>' + name + '</h1>';
    html += '<p>' + desc + '</p>';
    if (p.partNumbers && p.partNumbers.length > 0) {
        html += '<h3>' + (lang === 'zh' ? '可选型号' : 'Available Models') + ' (' + p.partNumbers.length + ')</h3>';
        html += '<div class="table-responsive"><table class="spec-table"><thead><tr>';
        var headers = Object.keys(p.partNumbers[0]);
        for (var h = 0; h < headers.length; h++) { html += '<th>' + headers[h] + '</th>'; }
        html += '</tr></thead><tbody>';
        for (var i = 0; i < p.partNumbers.length; i++) {
            html += '<tr>';
            for (var h = 0; h < headers.length; h++) { html += '<td>' + (p.partNumbers[i][headers[h]] || '') + '</td>'; }
            html += '</tr>';
        }
        html += '</tbody></table></div>';
    }
    if (p.parameters) {
        html += '<h3>' + (lang === 'zh' ? '技术参数' : 'Specifications') + '</h3>';
        html += '<table class="spec-table">';
        var params = p.parameters;
        for (var key in params) {
            if (params.hasOwnProperty(key)) {
                html += '<tr><td><strong>' + key + '</strong></td><td>' + params[key] + '</td></tr>';
            }
        }
        html += '</table>';
    }
    html += '<div style="margin-top:24px;"><a href="/contact.html?product=' + p.slug + '" class="btn btn-primary">' + (lang === 'zh' ? '获取报价' : 'Request Quote') + '</a></div>';
    html += '</div>';
    grid.innerHTML = html;
}

function toggleMobileMenu() {
    var nl = document.querySelector('.nav-list');
    if (nl) nl.classList.toggle('active');
}
</script>
