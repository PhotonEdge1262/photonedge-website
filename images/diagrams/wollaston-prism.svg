<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Two wedges -->
  <polygon points="130,50 210,100 130,150" fill="rgba(59,130,246,0.06)" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="210,100 290,50 290,150" fill="rgba(59,130,246,0.06)" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Input beam -->
  <line x1="30" y1="100" x2="128" y2="100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowR)"/>
  <!-- Two diverging output beams -->
  <line x1="212" y1="98" x2="370" y2="55" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="212" y1="102" x2="370" y2="145" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="300" y="48" font-size="9" fill="#ef4444">e-ray</text>
  <text x="300" y="155" font-size="9" fill="#22c55e">o-ray</text>
  <text x="80" y="92" font-size="10" fill="#64748b">Input</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Wollaston prism: splits into orthogonal polarizations</text>
</svg>