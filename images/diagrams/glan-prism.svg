<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Two calcite prisms -->
  <polygon points="140,50 220,50 220,150 140,150" fill="rgba(59,130,246,0.06)" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="220,50 300,50 300,150 220,150" fill="rgba(59,130,246,0.06)" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Air gap -->
  <line x1="220" y1="50" x2="220" y2="150" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Input beam -->
  <line x1="30" y1="100" x2="138" y2="100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowR)"/>
  <!-- Ordinary ray exits side -->
  <line x1="180" y1="100" x2="180" y2="30" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <text x="185" y="28" font-size="9" fill="#ef4444">o-ray (rejected)</text>
  <!-- Extraordinary ray passes through -->
  <line x1="222" y1="100" x2="370" y2="100" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="300" y="92" font-size="10" fill="#64748b">e-ray (polarized)</text>
  <text x="80" y="92" font-size="10" fill="#64748b">Unpolarized</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Glan-type polarizer: birefringent crystal</text>
</svg>