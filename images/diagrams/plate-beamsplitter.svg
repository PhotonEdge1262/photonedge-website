<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Plate at 45 degrees -->
  <line x1="155" y1="40" x2="245" y2="160" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- Input beam -->
  <line x1="30" y1="100" x2="185" y2="100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowR)"/>
  <!-- Transmitted beam -->
  <line x1="215" y1="100" x2="370" y2="100" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <!-- Reflected beam (up) -->
  <line x1="200" y1="90" x2="200" y2="20" stroke="#ef4444" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <text x="80" y="92" font-size="10" fill="#64748b">Input</text>
  <text x="310" y="92" font-size="10" fill="#64748b">Transmitted</text>
  <text x="210" y="25" font-size="10" fill="#64748b">Reflected</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" fill="#64748b">Plate beamsplitter at 45° incidence</text>
</svg>