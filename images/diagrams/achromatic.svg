<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Cemented doublet: two lenses -->
  <path d="M192,42 Q180,100 192,158" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <path d="M208,42 Q220,100 208,158" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="200" y1="42" x2="200" y2="158" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Colored rays -->
  <line x1="40" y1="80" x2="190" y2="92" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="40" y1="80" x2="190" y2="92" stroke="#22c55e" stroke-width="1" marker-end="url(#arrowR)" transform="translate(0,3)"/>
  <line x1="40" y1="80" x2="190" y2="92" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowR)" transform="translate(0,6)"/>
  <line x1="40" y1="120" x2="190" y2="108" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="40" y1="120" x2="190" y2="108" stroke="#22c55e" stroke-width="1" marker-end="url(#arrowR)" transform="translate(0,-3)"/>
  <line x1="40" y1="120" x2="190" y2="108" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowR)" transform="translate(0,-6)"/>
  <!-- All converge to same point -->
  <line x1="210" y1="95" x2="340" y2="100" stroke="#ef4444" stroke-width="1"/>
  <line x1="210" y1="98" x2="340" y2="100" stroke="#22c55e" stroke-width="1"/>
  <line x1="210" y1="101" x2="340" y2="100" stroke="#3b82f6" stroke-width="1"/>
  <line x1="210" y1="105" x2="340" y2="100" stroke="#ef4444" stroke-width="1"/>
  <line x1="210" y1="102" x2="340" y2="100" stroke="#22c55e" stroke-width="1"/>
  <line x1="210" y1="99" x2="340" y2="100" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="340" cy="100" r="3" fill="#1e293b"/>
  <text x="100" y="30" text-anchor="middle" font-size="11" fill="#64748b">White Light</text>
  <text x="280" y="30" text-anchor="middle" font-size="11" fill="#64748b">Color Corrected</text>
  <text x="340" y="125" text-anchor="middle" font-size="10" fill="#64748b">f (common focus)</text>
</svg>