<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Dove prism (truncated right-angle prism) -->
  <polygon points="100,80 300,80 280,130 120,130" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="30" y1="105" x2="100" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="300" y1="105" x2="370" y2="105" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <!-- Rotation indicator -->
  <path d="M200,80 A20,20 0 0,1 210,75" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <text x="60" y="98" font-size="10" fill="#64748b">Input</text>
  <text x="330" y="98" font-size="10" fill="#64748b">Output</text>
  <text x="200" y="170" text-anchor="middle" font-size="10" fill="#64748b">Image rotation: 2× prism rotation</text>
</svg>