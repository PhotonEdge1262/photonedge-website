<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>
  <rect width="400" height="200" fill="#f8fafc" rx="4"/>
  <!-- Window (flat parallel surfaces) -->
  <rect x="185" y="45" width="30" height="110" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-width="1.5" rx="1"/>
  <!-- Light rays passing straight through -->
  <line x1="40" y1="70" x2="185" y2="70" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="40" y1="100" x2="185" y2="100" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="40" y1="130" x2="185" y2="130" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="215" y1="70" x2="360" y2="70" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="215" y1="100" x2="360" y2="100" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <line x1="215" y1="130" x2="360" y2="130" stroke="#ef4444" stroke-width="1" marker-end="url(#arrowR)"/>
  <text x="100" y="30" text-anchor="middle" font-size="11" fill="#64748b">Incident Light</text>
  <text x="290" y="30" text-anchor="middle" font-size="11" fill="#64748b">Transmitted</text>
  <text x="200" y="175" text-anchor="middle" font-size="10" fill="#64748b">Parallel surfaces, minimal deviation</text>
</svg>