<h2 class="text-2xl font-bold text-gray-800 mb-4">引言</h2>

<p class="mb-4">光学棱镜通过折射和反射改变光的方向、分离颜色或偏振。了解不同类型棱镜的特性有助于正确选型。</p>

<h2 class="text-2xl font-bold text-gray-800 mt-8 mb-4">棱镜类型</h2>

<p class="mb-4">常见棱镜类型：</p>

<ul class="list-disc mb-4"><li class="ml-6 mb-2">直角棱镜：90°光束偏转</li><li class="ml-6 mb-2">五角棱镜：90°偏转，不受安装角度影响</li><li class="ml-6 mb-2">屋脊棱镜：倒像功能</li><li class="ml-6 mb-2">角锥棱镜：180°回归反射</li><li class="ml-6 mb-2">道威棱镜：成像旋转</li><li class="ml-6 mb-2">等边色散棱镜：光谱分离</li></ul>

<h2 class="text-2xl font-bold text-gray-800 mt-8 mb-4">应用场景</h2>

<ul class="list-disc mb-4"><li class="ml-6 mb-2">直角棱镜：光学仪器转向、成像系统</li><li class="ml-6 mb-2">五角棱镜：测距仪、取景器</li><li class="ml-6 mb-2">角锥棱镜：激光测距、干涉仪</li><li class="ml-6 mb-2">等边色散棱镜：光谱分析、单色仪</li></ul>

<h2 class="text-2xl font-bold text-gray-800 mt-8 mb-4">结论</h2>

<p class="mb-4">每种棱镜都有特定的光学功能和应用场景。恒鼎光提供各种类型的高精度棱镜，支持定制加工。</p>
